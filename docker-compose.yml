services:
  lush-korea-scraper:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data
  backend-tests:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - path: .env
        required: false
    volumes:
      - ./backend/pipelines:/app/pipelines
      - ./backend/tests:/app/tests
      - ./pytest.ini:/app/pytest.ini:ro
    command: ["python", "-m", "pytest", "tests"]
